name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx vitest run --reporter=verbose

  lint:
    name: Lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Check for console.log in src/
        run: |
          set +e
          # Skip lines whose content starts with a line-comment or JSDoc
          # marker — those are prose references to console.log, not calls.
          MATCHES=$(grep -rnE "console\.(log|debug)" src/ \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir="__tests__" \
            --exclude="*.test.ts" --exclude="*.test.tsx" \
            | grep -vE ":[0-9]+:[[:space:]]*(//|\*)" \
            | grep -v "// eslint-ignore-console" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Unapproved console.* usage found — use src/lib/logger.ts"
            echo "$MATCHES"
            exit 1
          fi
